<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSE Stream → JSON</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f7fa;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid #e2e8f0;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #7c3aed;
    }

    header span {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .main {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel + .panel {
      border-left: 1px solid #e2e8f0;
    }

    .panel-header {
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #7c3aed;
      color: #fff;
    }
    .btn-primary:hover { background: #6d28d9; }

    .btn-ghost {
      background: #f1f5f9;
      color: #64748b;
    }
    .btn-ghost:hover { background: #e2e8f0; }

    .btn-danger {
      background: transparent;
      color: #ef4444;
      border: 1px solid #fecaca;
    }
    .btn-danger:hover { background: #fef2f2; }

    textarea {
      flex: 1;
      width: 100%;
      background: #fff;
      color: #334155;
      border: none;
      outline: none;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      resize: none;
    }

    textarea::placeholder { color: #cbd5e1; }

    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      background: #f8fafc;
    }

    .output-area:empty::before {
      content: '// 解析结果将显示在这里';
      color: #cbd5e1;
    }

    .msg-block {
      margin-bottom: 20px;
    }

    .msg-block-title {
      font-size: 0.72rem;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .json-tree {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .json-key    { color: #0369a1; }
    .json-string { color: #16a34a; }
    .json-number { color: #d97706; }
    .json-bool   { color: #db2777; }
    .json-null   { color: #94a3b8; }

    .error-block {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px 14px;
      color: #b91c1c;
      font-size: 0.8rem;
    }

    .toolbar {
      padding: 10px 16px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status {
      margin-left: auto;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .status.ok { color: #16a34a; }
    .status.err { color: #ef4444; }

    .tabs {
      display: flex;
      border-bottom: 1px solid #e2e8f0;
      background: #fff;
    }

    .tab {
      padding: 10px 18px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #94a3b8;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }

    .tab.active {
      color: #7c3aed;
      border-bottom-color: #7c3aed;
    }

    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; flex: 1; }

    .raw-chunks {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #f8fafc;
    }

    .chunk-row {
      display: flex;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.78rem;
    }

    .chunk-idx {
      color: #cbd5e1;
      min-width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    .chunk-text { color: #94a3b8; word-break: break-all; }
    .chunk-text.has-data { color: #2563eb; }
    .chunk-text.is-done { color: #7c3aed; }
  </style>
</head>
<body>

<header>
  <h1>SSE → JSON</h1>
  <span>解析 OpenAI 兼容 SSE 流为完整 JSON 消息</span>
</header>

<div class="main">
  <!-- Left: input -->
  <div class="panel" style="max-width: 52%;">
    <div class="panel-header">
      <span>SSE 输入</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost" id="btnSample">示例</button>
        <button class="btn btn-danger" id="btnClear">清空</button>
        <button class="btn btn-primary" id="btnConvert">转换 ▶</button>
      </div>
    </div>
    <textarea id="input" placeholder="粘贴 SSE stream 内容，每行以 data: 开头…

data: {&quot;id&quot;:&quot;chatcmpl-xxx&quot;,...}
data: {&quot;id&quot;:&quot;chatcmpl-xxx&quot;,...}
data: [DONE]"></textarea>
    <div class="toolbar">
      <span class="status" id="inputStatus"></span>
    </div>
  </div>

  <!-- Right: output -->
  <div class="panel">
    <div class="tabs">
      <div class="tab active" data-tab="result">解析结果</div>
      <div class="tab" data-tab="raw">原始 chunks</div>
    </div>

    <div class="tab-content active" id="tab-result">
      <div class="panel-header">
        <span id="resultLabel">–</span>
        <button class="btn btn-ghost" id="btnCopy">复制 JSON</button>
      </div>
      <div class="output-area" id="output"></div>
    </div>

    <div class="tab-content" id="tab-raw">
      <div class="raw-chunks" id="rawChunks"></div>
    </div>
  </div>
</div>

<script>
// ---------- sample ----------
const SAMPLE = `data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"role":"assistant","content":""},"logprobs":null,"finish_reason":null}],"prompt_token_ids":null}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"tool_calls":[{"id":"call_c2ad5ba38954495b911ff3e9","type":"function","index":0,"function":{"name":"web_search","arguments":""}}]},"logprobs":null,"finish_reason":null,"token_ids":null}]}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"tool_calls":[{"index":0,"function":{"arguments":"{"}}]},"logprobs":null,"finish_reason":null,"token_ids":null}]}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"tool_calls":[{"index":0,"function":{"arguments":"\\"query\\": \\"科技新闻 2026-03-26\\""}}]},"logprobs":null,"finish_reason":null,"token_ids":null}]}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"tool_calls":[{"index":0,"function":{"arguments":", \\"count\\": 5"}}]},"logprobs":null,"finish_reason":null,"token_ids":null}]}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"tool_calls":[{"index":0,"function":{"arguments":", \\"freshness\\": \\"day\\""}}]},"logprobs":null,"finish_reason":null,"token_ids":null}]}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"tool_calls":[{"index":0,"function":{"arguments":", \\"search_lang\\": \\"zh-hans\\""}}]},"logprobs":null,"finish_reason":null,"token_ids":null}]}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"tool_calls":[{"index":0,"function":{"arguments":", \\"ui_lang\\": \\"zh-CN\\""}}]},"logprobs":null,"finish_reason":null,"token_ids":null}]}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"tool_calls":[{"index":0,"function":{"arguments":"}"}}]},"logprobs":null,"finish_reason":null,"token_ids":null}]}

data: {"id":"chatcmpl-aeee2a6c25a7ebec","object":"chat.completion.chunk","created":1774495321,"model":"Qwen/Qwen3.5-122B","choices":[{"index":0,"delta":{"content":""},"logprobs":null,"finish_reason":"tool_calls","stop_reason":null,"token_ids":null}]}

data: [DONE]`;

// ---------- parse ----------
function parseSSE(raw) {
  const lines = raw.split(/\r?\n/);
  const chunks = [];

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (!trimmed.startsWith('data:')) continue;

    const payload = trimmed.slice(5).trim();
    if (payload === '[DONE]') {
      chunks.push({ done: true });
      continue;
    }

    try {
      const parsed = JSON.parse(payload);
      chunks.push({ done: false, data: parsed });
    } catch (e) {
      chunks.push({ done: false, error: e.message, raw: payload });
    }
  }

  return chunks;
}

// Merge all delta chunks into a final message per choice index
function mergeChunks(chunks) {
  // Map: choiceIndex -> message state
  const messages = {};
  let meta = null;

  for (const chunk of chunks) {
    if (chunk.done || chunk.error) continue;
    const { data } = chunk;

    if (!meta) {
      meta = {
        id: data.id,
        model: data.model,
        created: data.created,
        object: data.object,
      };
    }

    const choices = data.choices || [];
    for (const choice of choices) {
      const idx = choice.index ?? 0;
      if (!messages[idx]) {
        messages[idx] = {
          index: idx,
          role: null,
          content: '',
          tool_calls: {},
          finish_reason: null,
        };
      }
      const msg = messages[idx];

      if (choice.finish_reason) msg.finish_reason = choice.finish_reason;

      const delta = choice.delta || {};

      if (delta.role) msg.role = delta.role;
      if (typeof delta.content === 'string') msg.content += delta.content;

      if (delta.tool_calls) {
        for (const tc of delta.tool_calls) {
          const ti = tc.index ?? 0;
          if (!msg.tool_calls[ti]) {
            msg.tool_calls[ti] = {
              id: tc.id || null,
              type: tc.type || 'function',
              function: { name: '', arguments: '' },
            };
          }
          const existing = msg.tool_calls[ti];
          if (tc.id) existing.id = tc.id;
          if (tc.type) existing.type = tc.type;
          if (tc.function) {
            if (tc.function.name) existing.function.name += tc.function.name;
            if (tc.function.arguments) existing.function.arguments += tc.function.arguments;
          }
        }
      }
    }
  }

  // Post-process tool_calls: try to parse arguments JSON
  const result = [];
  for (const idx of Object.keys(messages).sort((a, b) => a - b)) {
    const msg = messages[idx];
    const out = {
      index: msg.index,
      role: msg.role,
      content: msg.content,
      finish_reason: msg.finish_reason,
    };

    const tcKeys = Object.keys(msg.tool_calls);
    if (tcKeys.length > 0) {
      out.tool_calls = tcKeys.sort((a, b) => a - b).map(ti => {
        const tc = msg.tool_calls[ti];
        let parsedArgs = tc.function.arguments;
        try { parsedArgs = JSON.parse(tc.function.arguments); } catch (_) {}
        return {
          id: tc.id,
          type: tc.type,
          function: {
            name: tc.function.name,
            arguments: parsedArgs,
          },
        };
      });
    }

    result.push(out);
  }

  return { meta, choices: result };
}

// ---------- syntax highlight ----------
function highlight(json) {
  const str = typeof json === 'string' ? json : JSON.stringify(json, null, 2);
  return str
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d*)?([eE][+-]?\d+)?)/g, match => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) return `<span class="json-key">${match}</span>`;
        return `<span class="json-string">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
      if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
      return `<span class="json-number">${match}</span>`;
    });
}

// ---------- render ----------
function render(chunks, merged) {
  const output = document.getElementById('output');
  const rawChunks = document.getElementById('rawChunks');
  const resultLabel = document.getElementById('resultLabel');
  const inputStatus = document.getElementById('inputStatus');

  // Raw chunks panel
  rawChunks.innerHTML = '';
  chunks.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'chunk-row';
    const idx = document.createElement('span');
    idx.className = 'chunk-idx';
    idx.textContent = i + 1;
    const text = document.createElement('span');
    if (c.done) {
      text.className = 'chunk-text is-done';
      text.textContent = '[DONE]';
    } else if (c.error) {
      text.className = 'chunk-text';
      text.style.color = '#f87171';
      text.textContent = `[ERROR] ${c.error}: ${c.raw}`;
    } else {
      text.className = 'chunk-text has-data';
      text.textContent = JSON.stringify(c.data);
    }
    row.appendChild(idx);
    row.appendChild(text);
    rawChunks.appendChild(row);
  });

  // Result panel
  const errors = chunks.filter(c => c.error);
  const dataChunks = chunks.filter(c => !c.done && !c.error);

  inputStatus.textContent = `${dataChunks.length} chunks · ${errors.length} errors`;
  inputStatus.className = 'status ' + (errors.length ? 'err' : 'ok');

  if (merged.choices.length === 0) {
    output.innerHTML = '<div class="error-block">未找到有效的 choices 数据。请检查输入格式。</div>';
    resultLabel.textContent = '–';
    return;
  }

  resultLabel.textContent = `${merged.choices.length} message(s) · model: ${merged.meta?.model || '?'}`;

  let html = '';

  // Full merged choices JSON block
  html += `<div class="msg-block">`;
  html += `<div class="msg-block-title">choices (merged)</div>`;
  html += `<div class="json-tree">${highlight(merged.choices)}</div>`;
  html += `</div>`;

  // Individual tool call arguments (if any)
  for (const choice of merged.choices) {
    if (choice.tool_calls) {
      for (const tc of choice.tool_calls) {
        if (tc.function && typeof tc.function.arguments === 'object') {
          html += `<div class="msg-block">`;
          html += `<div class="msg-block-title">tool_call[${tc.id || '?'}].function.arguments (parsed)</div>`;
          html += `<div class="json-tree">${highlight(tc.function.arguments)}</div>`;
          html += `</div>`;
        }
      }
    }
  }

  // Content text if present
  for (const choice of merged.choices) {
    if (choice.content) {
      html += `<div class="msg-block">`;
      html += `<div class="msg-block-title">content (text)</div>`;
      html += `<div class="json-tree">${escapeHtml(choice.content)}</div>`;
      html += `</div>`;
    }
  }

  output.innerHTML = html;

  // Store for copy
  output._data = merged.choices;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------- events ----------
document.getElementById('btnConvert').addEventListener('click', () => {
  const raw = document.getElementById('input').value;
  if (!raw.trim()) return;
  const chunks = parseSSE(raw);
  const merged = mergeChunks(chunks);
  render(chunks, merged);
});

document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('input').value = '';
  document.getElementById('output').innerHTML = '';
  document.getElementById('rawChunks').innerHTML = '';
  document.getElementById('resultLabel').textContent = '–';
  document.getElementById('inputStatus').textContent = '';
});

document.getElementById('btnSample').addEventListener('click', () => {
  document.getElementById('input').value = SAMPLE;
});

document.getElementById('btnCopy').addEventListener('click', () => {
  const output = document.getElementById('output');
  const data = output._data;
  if (!data) return;
  navigator.clipboard.writeText(JSON.stringify(data, null, 2))
    .then(() => {
      const btn = document.getElementById('btnCopy');
      const orig = btn.textContent;
      btn.textContent = '已复制！';
      setTimeout(() => btn.textContent = orig, 1500);
    });
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// Auto-convert on paste
document.getElementById('input').addEventListener('paste', () => {
  setTimeout(() => document.getElementById('btnConvert').click(), 50);
});
</script>

</body>
</html>
